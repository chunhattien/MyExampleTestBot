name: Telegram Listener (message_id mode)

on:
  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install pyrogram tgcrypto requests

      - name: Start Listener
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import os
          import requests
          from pyrogram import Client, filters

          api_id = int(os.getenv("API_ID"))
          api_hash = os.getenv("API_HASH")
          session = os.getenv("SESSION_STRING")

          token = os.getenv("GH_TOKEN")
          repo = os.getenv("REPO")

          print("✅ Listener starting...", flush=True)

          app = Client(
              "listener",
              api_id,
              api_hash,
              session_string=session
          )

          def trigger_worker(chat_id, message_id, media_group_id):
              url = f"https://api.github.com/repos/{repo}/dispatches"

              payload = {
                  "event_type": "telegram_media",
                  "client_payload": {
                      "chat_id": chat_id,
                      "message_id": message_id,
                      "media_group_id": media_group_id
                  }
              }

              r = requests.post(
                  url,
                  headers={
                      "Authorization": f"token {token}",
                      "Accept": "application/vnd.github+json"
                  },
                  json=payload
              )

              print("Dispatch:", r.status_code, payload, flush=True)

          @app.on_message(filters.all)
          async def handler(client, message):

              if not (
                  message.video
                  or message.document
                  or message.animation
              ):
                  return

              chat_id = message.chat.id
              message_id = message.id
              media_group_id = message.media_group_id

              print(f"🚀 Media detected chat={chat_id} msg={message_id}", flush=True)

              trigger_worker(chat_id, message_id, media_group_id)

          print("✅ Listener ready", flush=True)
          app.run()
          EOF
