name: telegram_worker

on:
  workflow_dispatch:
    inputs:
      chat_id:
        required: true
      message_id:
        required: true

jobs:
  worker:
    runs-on: ubuntu-latest

    steps:
      - name: Install Python
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto

      - name: Run worker
        run: |
          python - << 'EOF'
          import asyncio
          from pyrogram import Client

          api_id = int("${{ secrets.API_ID }}")
          api_hash = "${{ secrets.API_HASH }}"
          session = "${{ secrets.SESSION_STRING }}"

          chat_id = int("${{ github.event.inputs.chat_id }}")
          message_id = int("${{ github.event.inputs.message_id }}")

          async def main():
              print("🎬 Worker started")
              print("chat:", chat_id, "msg:", message_id)

              app = Client(
                  "worker",
                  api_id=api_id,
                  api_hash=api_hash,
                  session_string=session
              )

              await app.start()

              try:
                  # ⭐ sync peer cache (FIX PEER_ID_INVALID)
                  async for _ in app.get_dialogs():
                      pass

                  print("✅ dialogs synced")

                  # copy thay vì forward (ổn định hơn)
                  await app.copy_message(
                      chat_id="me",
                      from_chat_id=chat_id,
                      message_id=message_id
                  )

                  print("✅ message copied")

              except Exception as e:
                  print("❌ ERROR:", e)

              finally:
                  await app.stop()
                  print("🏁 Worker finished")

          asyncio.run(main())
          EOF
