name: Telegram Streaming Worker

on:
  repository_dispatch:
    types: [telegram_video]

concurrency:
  group: telegram-stream
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyrogram tgcrypto

      - name: Stream Relay
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          VIDEO_LINK: ${{ github.event.client_payload.link }}
        run: |
          python - <<'EOF'
          import os
          import re
          import asyncio
          from pyrogram import Client

          api_id = int(os.getenv("API_ID"))
          api_hash = os.getenv("API_HASH")
          session = os.getenv("SESSION_STRING")
          dest_chat = os.getenv("DEST_CHAT")
          link = os.getenv("VIDEO_LINK")

          print("🎬 Worker started", flush=True)
          print("Link:", link, flush=True)

          async def main():
              async with Client(
                  "worker",
                  api_id,
                  api_hash,
                  session_string=session
              ) as app:

                  # -------- Parse link ----------
                  pattern = r"t\.me/(?:c/)?([^/]+)/(\d+)"
                  m = re.search(pattern, link)

                  if not m:
                      print("❌ Invalid link", flush=True)
                      return

                  chat_val = m.group(1)
                  msg_id = int(m.group(2))

                  if chat_val.startswith("-100"):
                      target_chat = int(chat_val)
                  elif chat_val.isdigit():
                      target_chat = int("-100" + chat_val)
                  else:
                      target_chat = chat_val

                  print("📡 Target:", target_chat, msg_id, flush=True)

                  # -------- FIX PEER CACHE ----------
                  print("🔄 Resolving peer...", flush=True)

                  try:
                      await app.get_chat(target_chat)
                  except Exception as e:
                      print("get_chat:", e, flush=True)

                  async for dialog in app.get_dialogs(limit=500):
                      if dialog.chat.id == target_chat:
                          print("✅ Peer cached", flush=True)
                          break

                  # -------- Fetch message ----------
                  msg = await app.get_messages(target_chat, msg_id)

                  if not msg:
                      print("❌ Message not found", flush=True)
                      return

                  media = msg.video or msg.document or msg.animation

                  if not media:
                      print("⚠️ No media found", flush=True)
                      return

                  print("🚀 Streaming relay...", flush=True)

                  stream = await app.stream_media(msg)

                  await app.send_video(
                      dest_chat,
                      stream,
                      caption=msg.caption or "✅ Relayed via GitHub Actions"
                  )

                  print("✅ DONE", flush=True)

          asyncio.run(main())
          EOF
