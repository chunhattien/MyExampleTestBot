name: Telegram Worker (message_id mode)

on:
  repository_dispatch:
    types: [telegram_media]

concurrency:
  group: telegram-stream
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install pyrogram tgcrypto

      - name: Process Media
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          MESSAGE_ID: ${{ github.event.client_payload.message_id }}
          MEDIA_GROUP_ID: ${{ github.event.client_payload.media_group_id }}
        run: |
          python - <<'EOF'
          import os
          import asyncio
          from pyrogram import Client

          api_id = int(os.getenv("API_ID"))
          api_hash = os.getenv("API_HASH")
          session = os.getenv("SESSION_STRING")

          dest_chat = os.getenv("DEST_CHAT")
          chat_id = int(os.getenv("CHAT_ID"))
          message_id = int(os.getenv("MESSAGE_ID"))
          media_group_id = os.getenv("MEDIA_GROUP_ID")

          print("🎬 Worker started", flush=True)
          print("chat:", chat_id, "msg:", message_id, flush=True)

          async def main():
              async with Client(
                  "worker",
                  api_id,
                  api_hash,
                  session_string=session
              ) as app:

                  # ensure peer known
                  await app.get_chat(chat_id)

                  # ---------- album ----------
                  if media_group_id:
                      print("📦 Media group detected", flush=True)

                      msgs = await app.get_media_group(chat_id, message_id)

                      for m in msgs:
                          media = m.video or m.document or m.animation
                          if not media:
                              continue

                          stream = await app.stream_media(m)

                          await app.send_video(
                              dest_chat,
                              stream,
                              caption=m.caption or "✅ Album relay"
                          )

                      print("✅ Album done", flush=True)
                      return

                  # ---------- single media ----------
                  msg = await app.get_messages(chat_id, message_id)

                  media = msg.video or msg.document or msg.animation
                  if not media:
                      print("⚠️ No media", flush=True)
                      return

                  print("🚀 Streaming...", flush=True)

                  stream = await app.stream_media(msg)

                  await app.send_video(
                      dest_chat,
                      stream,
                      caption=msg.caption or "✅ Relayed"
                  )

                  print("✅ DONE", flush=True)

          asyncio.run(main())
          EOF
