name: Telegram Bot Listener

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: telegram-bot-listener
  cancel-in-progress: true

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install python-telegram-bot==20.7 requests

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_ID: ${{ secrets.DOWNLOADER_WORKFLOW_ID }}
          ALLOWED_USER: ${{ secrets.ALLOWED_USER }}
        run: |
          python - <<EOF
          import os, requests, asyncio
          from telegram import Update
          from telegram.ext import ApplicationBuilder, MessageHandler, filters, ContextTypes

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          GH_TOKEN = os.environ["GH_TOKEN"]
          REPO = os.environ["REPO"]
          WORKFLOW_ID = os.environ["WORKFLOW_ID"]
          ALLOWED = os.environ.get("ALLOWED_USER")

          headers = {
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github+json"
          }

          pending_albums = {}

          async def trigger_workflow(chat_id, message_ids, source_type):
              payload = {
                  "chat_id": chat_id,
                  "message_id": ",".join(str(mid) for mid in message_ids),
                  "source_type": source_type
              }
              r = requests.post(
                  f"https://api.github.com/repos/{REPO}/actions/workflows/{WORKFLOW_ID}/dispatches",
                  headers=headers,
                  json={"ref": "main", "inputs": payload}
              )
              return r.status_code == 204

          async def process_album(chat_id, media_group_id, first_msg):
              await asyncio.sleep(2)
              key = (chat_id, media_group_id)
              if key in pending_albums:
                  msg_ids = pending_albums[key][0]
                  del pending_albums[key]
                  success = await trigger_workflow(str(chat_id), msg_ids, "album")
                  if success:
                      await first_msg.reply_text(f"🚀 Album job started with {len(msg_ids)} items!")
                  else:
                      await first_msg.reply_text("❌ Failed to start album job")

          async def handle(update: Update, context: ContextTypes.DEFAULT_TYPE):
              msg = update.message
              if ALLOWED and str(msg.from_user.id) != ALLOWED:
                  return

              # Xác định real_chat_id và real_message_id dựa trên forward hay direct
              if msg.forward_from_chat:
                  real_chat_id = msg.forward_from_chat.id
                  real_message_id = msg.forward_from_message_id
                  source_type = "forward"
              elif msg.forward_from:
                  real_chat_id = msg.forward_from.id
                  real_message_id = msg.forward_from_message_id
                  source_type = "forward"
              else:
                  real_chat_id = msg.chat.id
                  real_message_id = msg.message_id
                  source_type = "direct"

              # Xử lý link (text, không media)
              if msg.text and not msg.media_group_id:
                  payload = {
                      "chat_id": msg.text,
                      "message_id": "0",
                      "source_type": "link"
                  }
                  r = requests.post(
                      f"https://api.github.com/repos/{REPO}/actions/workflows/{WORKFLOW_ID}/dispatches",
                      headers=headers,
                      json={"ref": "main", "inputs": payload}
                  )
                  if r.status_code == 204:
                      await msg.reply_text("🚀 Link job started!")
                  else:
                      await msg.reply_text(f"❌ Error {r.status_code}\n{r.text}")
                  return

              # Xử lý album (media group)
              if msg.media_group_id and (msg.video or msg.document or msg.animation or msg.photo):
                  key = (real_chat_id, msg.media_group_id)
                  if key not in pending_albums:
                      pending_albums[key] = ([real_message_id], None)
                      task = asyncio.create_task(process_album(real_chat_id, msg.media_group_id, msg))
                      pending_albums[key] = ([real_message_id], task)
                  else:
                      msg_list, task = pending_albums[key]
                      msg_list.append(real_message_id)
                      pending_albums[key] = (msg_list, task)
                  return

              # Xử lý media đơn lẻ
              if msg.video or msg.document or msg.animation or msg.photo:
                  success = await trigger_workflow(str(real_chat_id), [real_message_id], source_type)
                  if success:
                      await msg.reply_text("🚀 Job started!")
                  else:
                      await msg.reply_text("❌ Failed to start job")
                  return

              await msg.reply_text("❌ Unsupported message")

          app = ApplicationBuilder().token(BOT_TOKEN).build()
          app.add_handler(MessageHandler(filters.ALL, handle))
          print("Bot running with album grouping...")
          app.run_polling()
          EOF
