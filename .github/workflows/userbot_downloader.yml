name: Telegram Userbot Downloader

on:
  workflow_dispatch:
    inputs:
      video_link:
        description: 'Dán link video nội bộ (t.me/c/...) hoặc link nhóm công khai'
        required: true

jobs:
  run_userbot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Process Video
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          VIDEO_LINK: ${{ github.event.inputs.video_link }}
        run: |
          python - <<EOF
          import os
          import asyncio
          import re
          from pyrogram import Client

          async def main():
              api_id = int(os.getenv("API_ID"))
              api_hash = os.getenv("API_HASH")
              session = os.getenv("SESSION_STRING")
              dest_chat = int(os.getenv("DEST_CHAT"))
              video_link = os.getenv("VIDEO_LINK")

              async with Client("my_account", api_id, api_hash, session_string=session) as app:
                  # Phân tích link để lấy ID
                  # Ví dụ link: https://t.me/c/2418576402/285
                  pattern = r"t\.me/(?:c/)?([^/]+)/(\d+)"
                  match = re.search(pattern, video_link)
                  
                  if not match:
                      print("❌ Link không đúng định dạng Telegram!")
                      return

                  chat_val = match.group(1)
                  msg_id = int(match.group(2))
                  
                  # Xử lý ID chat cho nhóm kín (cần thêm -100)
                  if chat_val.isdigit():
                      target_chat = int("-100" + chat_val)
                  else:
                      target_chat = chat_val # Nhóm công khai dùng username

                  print(f"🔄 Đang kết nối tới chat: {target_chat}, tin nhắn: {msg_id}")

                  try:
                      # BƯỚC QUAN TRỌNG: Lấy đối tượng tin nhắn trước
                      msg = await app.get_messages(target_chat, msg_id)
                      
                      if msg.video or msg.document or msg.animation:
                          print("📥 Đang tải media về máy ảo GitHub...")
                          # Tải trực tiếp từ đối tượng tin nhắn
                          file_path = await app.download_media(msg)
                          
                          print(f"📤 Đang upload lên nhóm đích ({dest_chat})...")
                          await app.send_video(dest_chat, file_path, caption=f"✅ Tải từ: {video_link}")
                          
                          # Xóa file sau khi gửi để dọn dẹp bộ nhớ
                          os.remove(file_path)
                          print("✨ Hoàn thành!")
                      else:
                          print("⚠️ Tin nhắn này không chứa video hoặc file!")
                  except Exception as e:
                      print(f"❌ Có lỗi xảy ra: {str(e)}")

          asyncio.run(main())
          EOF
          
