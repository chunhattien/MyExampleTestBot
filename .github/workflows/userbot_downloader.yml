name: Telegram Userbot Downloader

on:
  workflow_dispatch:
    inputs:
      video_link:
        description: 'Dán link video nội bộ (t.me/c/...) hoặc link ngoài'
        required: true

jobs:
  run_userbot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Process Video
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          VIDEO_LINK: ${{ github.event.inputs.video_link }}
        run: |
          python - <<EOF
          import os
          import asyncio
          import re
          import sys
          from pyrogram import Client

          async def progress(current, total):
              # Hàm hiển thị phần trăm tải/gửi lên console
              percentage = current * 100 / total
              sys.stdout.write(f"\r🚀 Tiến độ: {percentage:.1f}%")
              sys.stdout.flush()

          async def main():
              api_id = int(os.getenv("API_ID"))
              api_hash = os.getenv("API_HASH")
              session = os.getenv("SESSION_STRING")
              dest_chat_raw = os.getenv("DEST_CHAT")
              video_link = os.getenv("VIDEO_LINK")

              # Chuyển đổi ID chat đích
              try:
                  dest_chat = int(dest_chat_raw)
              except:
                  dest_chat = dest_chat_raw

              async with Client("my_account", api_id, api_hash, session_string=session) as app:
                  print("🔄 Đang đồng bộ danh sách nhóm để tránh lỗi Peer ID...")
                  # Đọc 100 hội thoại gần nhất để cập nhật cache
                  async for dialog in app.get_dialogs(limit=100):
                      pass 

                  # Phân tích link Telegram
                  pattern = r"t\.me/(?:c/)?([^/]+)/(\d+)"
                  match = re.search(pattern, video_link)
                  
                  if not match:
                      print("\n❌ Link không đúng định dạng Telegram!")
                      return

                  chat_val = match.group(1)
                  msg_id = int(match.group(2))
                  
                  # Xử lý ID chat nếu là nhóm kín (cần tiền tố -100)
                  if chat_val.isdigit():
                      target_chat = int("-100" + chat_val)
                  else:
                      target_chat = chat_val

                  print(f"\n📡 Kết nối tới Chat: {target_chat}, Tin nhắn: {msg_id}")

                  try:
                      # Lấy đối tượng tin nhắn
                      msg = await app.get_messages(target_chat, msg_id)
                      
                      if msg and (msg.video or msg.document or msg.animation):
                          print("\n📥 Bắt đầu tải video về máy ảo GitHub...")
                          file_path = await app.download_media(msg, progress=progress)
                          
                          print(f"\n📤 Đang gửi video tới nhóm đích: {dest_chat}...")
                          # Gửi video vào nhóm đích
                          await app.send_video(
                              dest_chat, 
                              file_path, 
                              caption=f"✅ Tải thành công từ: {video_link}",
                              progress=progress
                          )
                          
                          # Xóa file tạm trên server GitHub
                          if os.path.exists(file_path):
                              os.remove(file_path)
                          print("\n✨ NHIỆM VỤ HOÀN THÀNH!")
                      else:
                          print("\n⚠️ Tin nhắn này không chứa phương tiện (Video/File)!")
                  except Exception as e:
                      print(f"\n❌ Lỗi hệ thống: {str(e)}")

          asyncio.run(main())
          EOF
          
