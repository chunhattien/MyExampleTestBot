name: Telegram Userbot Downloader

on:
  workflow_dispatch:
    inputs:
      chat_id:
        required: true
      message_id:
        required: true
      source_type:
        required: true

concurrency:
  group: userbot-downloader
  cancel-in-progress: false   # Không hủy job đang chạy, chỉ xếp hàng job mới

jobs:
  run_userbot:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # Tăng thời gian cho phép xử lý nhiều file và chờ trong hàng đợi

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Process Media
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
          SOURCE_TYPE: ${{ github.event.inputs.source_type }}
        run: |
          python - <<EOF
          import os, asyncio, sys, re
          from pyrogram import Client, errors
          from pyrogram.types import InputMediaPhoto, InputMediaVideo, InputMediaDocument

          async def progress(current, total):
              p = current * 100 / total
              sys.stdout.write(f"\r🚀 {p:.1f}%")
              sys.stdout.flush()

          async def main():
              api_id = int(os.getenv("API_ID"))
              api_hash = os.getenv("API_HASH")
              session = os.getenv("SESSION_STRING")

              dest_chat_raw = os.getenv("DEST_CHAT")
              chat_input = os.getenv("CHAT_ID")
              message_id_input = os.getenv("MESSAGE_ID")
              source_type = os.getenv("SOURCE_TYPE")

              print(f"🔍 Received inputs:")
              print(f"   chat_id: {chat_input}")
              print(f"   message_id: {message_id_input}")
              print(f"   source_type: {source_type}")

              # Parse destination chat
              try:
                  dest_chat = int(dest_chat_raw)
              except:
                  dest_chat = dest_chat_raw

              # Parse message IDs (có thể là danh sách phân cách bằng dấu phẩy)
              if "," in message_id_input:
                  message_ids = [int(mid.strip()) for mid in message_id_input.split(",")]
              else:
                  message_ids = [int(message_id_input)]

              async with Client(
                  "userbot",
                  api_id,
                  api_hash,
                  session_string=session
              ) as app:

                  print("🔄 Syncing dialogs...")
                  async for _ in app.get_dialogs(limit=100):
                      pass

                  # Xác định target_chat dựa trên source_type
                  if source_type == "link":
                      pattern = r"t\.me/(?:c/)?([^/]+)/(\d+)"
                      m = re.search(pattern, chat_input)
                      if not m:
                          print("❌ Invalid link")
                          return
                      chat_val = m.group(1)
                      # Link chỉ có một message_id duy nhất
                      message_id = int(m.group(2))
                      if chat_val.isdigit():
                          target_chat = int("-100" + chat_val)
                      else:
                          target_chat = chat_val
                      # Ghi đè message_ids
                      message_ids = [message_id]
                  else:
                      # direct/forward/album – chat_input là số ID
                      try:
                          target_chat = int(chat_input)
                      except:
                          print(f"❌ Chat ID must be integer, got: {chat_input}")
                          return

                  print(f"🎯 Target chat: {target_chat}")
                  print(f"🎯 Message IDs: {message_ids}")

                  # Lấy tất cả các tin nhắn
                  messages = []
                  for mid in message_ids:
                      try:
                          msg = await app.get_messages(target_chat, mid)
                          if msg:
                              messages.append(msg)
                          else:
                              print(f"⚠️ Message {mid} not found, skipping")
                      except errors.RPCError as e:
                          print(f"⚠️ Error fetching message {mid}: {e}")

                  if not messages:
                      print("❌ No messages could be fetched.")
                      return

                  print(f"✅ Fetched {len(messages)} messages.")

                  # Xác định loại media và tải về
                  downloaded_files = []
                  media_list = []  # Cho album

                  for msg in messages:
                      media = None
                      media_type = None
                      if msg.video:
                          media = msg.video
                          media_type = "video"
                      elif msg.document:
                          media = msg.document
                          media_type = "document"
                      elif msg.animation:
                          media = msg.animation
                          media_type = "animation"
                      elif msg.photo:
                          media = msg.photo
                          media_type = "photo"

                      if not media:
                          print(f"⚠️ Message {msg.id} has no supported media, skipping")
                          continue

                      print(f"⬇️ Downloading message {msg.id} ({media_type})...")
                      file_path = await app.download_media(msg, progress=progress)
                      downloaded_files.append((file_path, media_type, msg.caption or ""))

                  if not downloaded_files:
                      print("❌ No media downloaded.")
                      return

                  print("\n⬆️ Uploading...")
                  if len(downloaded_files) == 1:
                      # Gửi đơn lẻ
                      file_path, media_type, caption = downloaded_files[0]
                      caption_full = caption + "\n\n✅ Processed by GitHub Action" if caption else "✅ Processed by GitHub Action"
                      if media_type == "video":
                          await app.send_video(dest_chat, file_path, caption=caption_full, progress=progress)
                      elif media_type == "document":
                          await app.send_document(dest_chat, file_path, caption=caption_full, progress=progress)
                      elif media_type == "animation":
                          await app.send_animation(dest_chat, file_path, caption=caption_full, progress=progress)
                      elif media_type == "photo":
                          await app.send_photo(dest_chat, file_path, caption=caption_full, progress=progress)
                  else:
                      # Gửi dạng album (media group)
                      for file_path, media_type, caption in downloaded_files:
                          caption_full = caption + "\n\n✅ Processed by GitHub Action" if caption else "✅ Processed by GitHub Action"
                          if media_type == "video":
                              media_list.append(InputMediaVideo(media=file_path, caption=caption_full))
                          elif media_type == "photo":
                              media_list.append(InputMediaPhoto(media=file_path, caption=caption_full))
                          # Document và animation không hỗ trợ trong media group? Thực tế chỉ photo/video mới tạo album được.
                          # Nếu gặp document/animation, ta gửi riêng? Hoặc bỏ qua? Ở đây tạm bỏ qua để tránh lỗi.
                          else:
                              print(f"⚠️ {media_type} cannot be in album, sending separately...")
                              if media_type == "document":
                                  await app.send_document(dest_chat, file_path, caption=caption_full)
                              elif media_type == "animation":
                                  await app.send_animation(dest_chat, file_path, caption=caption_full)
                      if media_list:
                          await app.send_media_group(dest_chat, media_list)

                  # Dọn dẹp file
                  for file_path, _, _ in downloaded_files:
                      os.remove(file_path)

                  print("\n✅ DONE")

          asyncio.run(main())
          EOF
