name: Telegram Userbot Downloader

on:
  workflow_dispatch:
    inputs:
      chat_id:
        required: true
      message_id:
        required: true
      source_type:
        required: true

jobs:
  run_userbot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto

      - name: Process Media
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          DEST_CHAT: ${{ secrets.DEST_CHAT }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
          SOURCE_TYPE: ${{ github.event.inputs.source_type }}
        run: |
          python - <<EOF
          import os, asyncio, sys, re
          from pyrogram import Client, errors

          async def progress(current, total):
              p = current * 100 / total
              sys.stdout.write(f"\r🚀 {p:.1f}%")
              sys.stdout.flush()

          async def main():
              api_id = int(os.getenv("API_ID"))
              api_hash = os.getenv("API_HASH")
              session = os.getenv("SESSION_STRING")

              dest_chat_raw = os.getenv("DEST_CHAT")
              chat_input = os.getenv("CHAT_ID")
              message_id_input = os.getenv("MESSAGE_ID")
              source_type = os.getenv("SOURCE_TYPE")

              print(f"🔍 Received inputs:")
              print(f"   chat_id: {chat_input}")
              print(f"   message_id: {message_id_input}")
              print(f"   source_type: {source_type}")

              # Parse destination chat
              try:
                  dest_chat = int(dest_chat_raw)
              except:
                  dest_chat = dest_chat_raw

              async with Client(
                  "userbot",
                  api_id,
                  api_hash,
                  session_string=session
              ) as app:

                  print("🔄 Syncing dialogs...")
                  dialogs_list = []
                  async for dialog in app.get_dialogs(limit=100):
                      dialogs_list.append((dialog.chat.id, dialog.chat.title or "Private"))
                  print(f"📋 Available dialogs (first 10): {dialogs_list[:10]}")

                  # Xác định target_chat dựa trên source_type
                  if source_type == "link":
                      pattern = r"t\.me/(?:c/)?([^/]+)/(\d+)"
                      m = re.search(pattern, chat_input)
                      if not m:
                          print("❌ Invalid link")
                          return
                      chat_val = m.group(1)
                      message_id = int(m.group(2))
                      if chat_val.isdigit():
                          target_chat = int("-100" + chat_val)
                      else:
                          target_chat = chat_val
                  else:
                      # "direct" hoặc "forward" – chat_input là số ID
                      try:
                          target_chat = int(chat_input)
                          message_id = int(message_id_input)
                      except:
                          print(f"❌ Chat ID / Message ID must be integers, got: {chat_input} / {message_id_input}")
                          return

                  print(f"🎯 Target chat: {target_chat} (type: {type(target_chat)})")
                  print(f"🎯 Target message ID: {message_id}")

                  # Kiểm tra xem target_chat có trong dialogs không
                  if target_chat not in [c[0] for c in dialogs_list]:
                      print("⚠️ Warning: Target chat not found in dialogs! Userbot might not have access.")

                  print(f"📥 Fetching message {message_id} from chat {target_chat}...")
                  try:
                      msg = await app.get_messages(target_chat, message_id)
                  except errors.RPCError as e:
                      print(f"❌ Telegram error: {e}")
                      return

                  if not msg:
                      print("❌ Message not found (empty response).")
                      return

                  # Debug chi tiết
                  print(f"✅ Message fetched successfully!")
                  print(f"   Message ID: {msg.id}")
                  print(f"   Chat ID: {msg.chat.id}")
                  print(f"   Has video: {bool(msg.video)}")
                  print(f"   Has document: {bool(msg.document)}")
                  print(f"   Has animation: {bool(msg.animation)}")
                  print(f"   Has photo: {bool(msg.photo)}")
                  print(f"   Caption: {msg.caption}")

                  media = None
                  media_type = None
                  if msg.video:
                      media = msg.video
                      media_type = "video"
                  elif msg.document:
                      media = msg.document
                      media_type = "document"
                  elif msg.animation:
                      media = msg.animation
                      media_type = "animation"
                  elif msg.photo:
                      media = msg.photo
                      media_type = "photo"

                  if not media:
                      print("❌ No supported media found (only video/document/animation/photo).")
                      return

                  print(f"✅ Found media type: {media_type}")

                  # Giữ caption gốc và thêm dòng xử lý
                  original_caption = msg.caption or ""
                  if original_caption:
                      caption = original_caption + "\n\n✅ Processed by GitHub Action"
                  else:
                      caption = "✅ Processed by GitHub Action"

                  print("⬇️ Downloading...")
                  file_path = await app.download_media(msg, progress=progress)

                  print("\n⬆️ Uploading...")
                  if media_type == "video":
                      await app.send_video(
                          dest_chat,
                          file_path,
                          caption=caption,
                          progress=progress
                      )
                  elif media_type == "document":
                      await app.send_document(
                          dest_chat,
                          file_path,
                          caption=caption,
                          progress=progress
                      )
                  elif media_type == "animation":
                      await app.send_animation(
                          dest_chat,
                          file_path,
                          caption=caption,
                          progress=progress
                      )
                  elif media_type == "photo":
                      await app.send_photo(
                          dest_chat,
                          file_path,
                          caption=caption,
                          progress=progress
                      )

                  os.remove(file_path)
                  print("\n✅ DONE")

          asyncio.run(main())
          EOF
